const SUPABASE_URL = "https://pnodohecpndksonfnjel.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBub2RvaGVjcG5ka3NvbmZuamVsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMjIwMjcsImV4cCI6MjA5MDY5ODAyN30.afLv5x4Cu290qkUSigiwkrFEn9Vtvfv342tngzoRsv0";

const HEADERS = {
  "apikey": SUPABASE_KEY,

};

const sb = {
  async select(query) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${query}`, { headers: HEADERS });
    if (!res.ok) throw new Error(await res.text());
    return res.json();
  },
  async insert(table, data) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
      method: "POST", headers: HEADERS, body: JSON.stringify(data),
    });
    if (!res.ok) throw new Error(await res.text());
    return res.json();
  },
  async count(table) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?select=id`, {
      headers: { ...HEADERS, "Prefer": "count=exact", "Range-Unit": "items", "Range": "0-0" }
    });
    return res.headers.get("content-range")?.split("/")[1] || "—";
  },
  async patch(table, id, data) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
      method: "PATCH", headers: HEADERS, body: JSON.stringify(data),
    });

    return res.json();

};

// ── HELPERS ───────────────────────────────────────────────────────────────────
function timeAgo(ts) {
  if (!ts) return "recently";
  const diff = Math.floor((Date.now() - new Date(ts)) / 1000);
  const mins  = Math.floor(diff / 60);
  const hours = Math.floor(diff / 3600);
  const days  = Math.floor(diff / 86400);
  const weeks = Math.floor(diff / 604800);
  if (diff < 60)  return mins === 0 ? "just now" : "1 min ago";
  if (mins < 60)  return mins + " min" + (mins === 1 ? "" : "s") + " ago";
  if (hours < 24) return hours + " hour" + (hours === 1 ? "" : "s") + " ago";
  if (days < 7)   return days + " day" + (days === 1 ? "" : "s") + " ago";
  return weeks + " week" + (weeks === 1 ? "" : "s") + " ago";
}

function getConf(c) {
  if (c >= 90) return { color: "#00C48C", label: "High" };
  if (c >= 75) return { color: "#FFD600", label: "Med"  };
  return { color: "#FF6B2B", label: "Low" };
}

function Spinner() {

}

function PriceCard({ item, topPick }) {
  const conf = getConf(item.confidence);
  return (
    <div className={`price-card ${topPick ? "top-pick" : ""}`}>
      {topPick && <div className="top-badge">⚡ Best Price</div>}
      <div className="card-top">
        <div>
          <div className="store-name">{item.store}</div>
          <div className="store-meta">
            <span className="store-area">📍 {item.area}</span>
          </div>
        </div>
        <div style={{textAlign:"right"}}>
          <div className="price-main">₦{Number(item.price).toLocaleString()}</div>
        </div>
      </div>
      <div className="card-bottom">
        <div className="confidence">
          <div className="conf-bar">
            <div className="conf-fill" style={{width:`${item.confidence}%`, background:conf.color}} />
          </div>
          <span className="conf-label" style={{color:conf.color}}>{item.confidence}% {conf.label}</span>
        </div>
        <span className="timestamp">🕐 {timeAgo(item.timestamp)}</span>
      </div>
    </div>
  );
}

function MiniBarChart({ data, color }) {
  const max = Math.max(...data), min = Math.min(...data);
  return (
    <div className="mini-chart">
      {data.map((v, i) => {
        const h = 16 + ((v - min) / (max - min || 1)) * 64;
        const isLast = i === data.length - 1;
        return (
          <div key={i} className="bar" style={{height:h, background: isLast ? color : "rgba(255,255,255,0.06)"}}>
            <span className="bar-label">{DAYS[i]}</span>
          </div>
        );
      })}
    </div>
  );
}

// ── RESULTS PAGE ──────────────────────────────────────────────────────────────
function ResultsPage({ itemId }) {
  const [sort,    setSort]    = useState("cheapest");
  const [prices,  setPrices]  = useState([]);
  const [loading, setLoading] = useState(true);
  const [error,   setError]   = useState(null);
  const item = ITEMS.find(i => i.id === itemId) || ITEMS[0];

  useEffect(() => {
    async function load() {
      setLoading(true); setError(null);
      try {
        const data = await sb.select(`prices?select=*&item=eq.${itemId}&order=price.asc`);
        setPrices(data || []);
      } catch(e) { setError(e.message); }
      setLoading(false);
    }
    load();
  }, [itemId]);

  const sorted = [...prices].sort((a, b) => {
    if (sort === "cheapest")      return a.price - b.price;
    if (sort === "most reliable") return b.confidence - a.confidence;
    return b.confidence - a.confidence;
  });

  const avgNow = prices.length ? Math.round(prices.reduce((s,p) => s + Number(p.price), 0) / prices.length) : 0;
  const minP   = prices.length ? Math.min(...prices.map(p => p.price)) : 0;
  const maxP   = prices.length ? Math.max(...prices.map(p => p.price)) : 0;
  const trending = maxP - minP > minP * 0.1 ? "up" : "stable";

  return (
    <div className="page">
      <div style={{padding:"20px 20px 12px"}}>
        <div style={{fontSize:13,color:"var(--muted)",marginBottom:6}}>Results for</div>
        <div style={{fontFamily:"var(--font-head)",fontSize:22,fontWeight:800,display:"flex",alignItems:"center",gap:8}}>
          <span>{item.icon}</span> {item.label}
        </div>
        {!loading && <div style={{fontSize:12,color:"var(--muted)",marginTop:4}}>{prices.length} reports · Avg ₦{avgNow.toLocaleString()}</div>}
      </div>

      {!loading && trending === "up" && prices.length > 1 && (
        <div className="trend-banner trend-up">
          <span style={{fontSize:18}}>📈</span>
          <div className="trend-text"><b style={{color:"var(--red)"}}>Price Variation High</b><span>₦{minP.toLocaleString()} – ₦{maxP.toLocaleString()} across stores. Compare carefully.</span></div>
        </div>
      )}

      {error && <div className="error-banner">⚠️ Could not load prices: {error}</div>}

      <div className="sort-row">
        {["cheapest","most reliable"].map(s => (
          <button key={s} className={`sort-btn ${sort===s?"active":""}`} onClick={() => setSort(s)}>
            {s==="cheapest"?"💰 Cheapest":"✅ Most Reliable"}
          </button>
        ))}
      </div>

      {loading ? <Spinner /> : sorted.length === 0
        ? <div className="empty-state"><div className="empty-icon">🔍</div><p>No prices reported for {item.label} yet.<br/>Be the first to add one!</p></div>
        : sorted.map((p, i) => <PriceCard key={p.id} item={p} topPick={i===0} />)
      }
    </div>
  );
}

// ── ADD PAGE ──────────────────────────────────────────────────────────────────
function AddPage({ onSubmit }) {
  const [item,       setItem]       = useState("");
  const [price,      setPrice]      = useState("");
  const [store,      setStore]      = useState("");
  const [area,       setArea]       = useState("");
  const [submitting, setSubmitting] = useState(false);
  const [error,      setError]      = useState(null);

  const valid = item && price && store && area && !submitting;

  async function handleSubmit() {
    if (!valid) return;
    setSubmitting(true); setError(null);
    try {
      // Check if same item + store + area already exists within last 48h
      const existing = await sb.select(
        "prices?select=id,confidence,price&item=eq." + item +
        "&store=eq." + encodeURIComponent(store) +
        "&area=eq." + area +
        "&order=timestamp.desc&limit=1"
      );

      if (existing && existing.length > 0) {
        const match = existing[0];
        const priceDiff = Math.abs(Number(price) - Number(match.price)) / Number(match.price);

        if (priceDiff <= 0.05) {
          // Price within 5% — same price confirmed, boost confidence (cap at 99)
          const newConf = Math.min(99, Math.round(match.confidence + 5));
          await sb.patch("prices", match.id, {
            confidence: newConf,
            price: Number(price),
            timestamp: new Date().toISOString(),
          });
          setSubmitting(false);
          onSubmit("boosted");
          return;
        }
        // Price differs by more than 5% — list as new entry (price has changed)
      }

      // No match — insert fresh
      await sb.insert("prices", {
        item, price: Number(price), store, area,
        confidence: 80, verified: false,
        timestamp: new Date().toISOString(),
      });
      setSubmitting(false);
      onSubmit("new");
    } catch(e) { setError(e.message); setSubmitting(false); }
  }

  return (
    <div className="page">
      <div className="form-header">
        <div className="form-title">Report a Price 📸</div>
        <div className="form-subtitle">Help your community find the best deals</div>
      </div>

      {error && <div className="error-banner" style={{margin:"0 20px 12px"}}>⚠️ {error}</div>}

      <div className="form-group">
        <label className="form-label">Item</label>
        <select className="form-select" value={item} onChange={e => setItem(e.target.value)}>
          <option value="">Select item...</option>
          {ITEMS.map(i => <option key={i.id} value={i.id}>{i.icon} {i.label}</option>)}
        </select>
      </div>

      <div className="form-group">
        <label className="form-label">Price (₦)</label>
        <div className="price-input-wrap">
          <span className="naira-sign">₦</span>
          <input className="form-input" type="number" placeholder="0" value={price} onChange={e => setPrice(e.target.value)} />
        </div>
      </div>

      <div className="form-group">
        <label className="form-label">Store / Market Name</label>
        <input className="form-input" placeholder="e.g. Mama Ngozi Provisions" value={store} onChange={e => setStore(e.target.value)} />
      </div>

      <div className="form-group">
        <label className="form-label">Area</label>
        <select className="form-select" value={area} onChange={e => setArea(e.target.value)}>
          <option value="">Select area...</option>
          <option>Yaba</option><option>Lekki</option><option>Ikeja</option>
          <option>Surulere</option><option>Oshodi</option>
        </select>
      </div>

      <div className="form-group">
        <label className="form-label">Photo (Optional)</label>
        <div className="photo-upload">
          <div style={{fontSize:28}}>📷</div>
          <p>Tap to add a receipt or price photo</p>
          <p style={{fontSize:11,marginTop:4}}>+10 bonus points with photo</p>
        </div>
      </div>

      <button className="submit-btn" onClick={handleSubmit} disabled={!valid}>
        {submitting ? "Submitting..." : "Submit Price Report →"}
      </button>
      <div className="points-preview">
        <span>🏅</span><span>You'll earn <b>+25 points</b> for this submission</span>
      </div>
    </div>
  );
}

// ── INSIGHTS PAGE ─────────────────────────────────────────────────────────────
function InsightsPage() {
  const [area,       setArea]       = useState("Yaba");
  const [activeItem, setActiveItem] = useState("rice");
  const [chartData,  setChartData]  = useState([]);
  const [savings,    setSavings]    = useState(0);
  const [loading,    setLoading]    = useState(true);
  const item = ITEMS.find(i => i.id === activeItem);

  useEffect(() => {
    async function load() {
      setLoading(true);
      try {
        const data = await sb.select(`prices?select=price,timestamp&item=eq.${activeItem}&area=eq.${area}&order=timestamp.asc&limit=50`);
        if (data && data.length > 0) {
          const prices = data.map(d => Number(d.price));
          const chunk = Math.ceil(prices.length / 7);
          const buckets = [];
          for (let i = 0; i < 7; i++) {
            const slice = prices.slice(i * chunk, (i + 1) * chunk);
            buckets.push(slice.length ? Math.round(slice.reduce((a,b) => a+b,0)/slice.length) : (buckets[buckets.length-1] || prices[0]));
          }
          setChartData(buckets);
          setSavings(Math.max(...prices) - Math.min(...prices));
        } else { setChartData([]); setSavings(0); }
      } catch(e) { setChartData([]); setSavings(0); }
      setLoading(false);
    }
    load();
  }, [activeItem, area]);

  const diff = chartData.length > 1 ? chartData[chartData.length-1] - chartData[0] : 0;
  const pct  = chartData[0] ? Math.abs(Math.round((diff / chartData[0]) * 100)) : 0;

  return (
    <div className="page">
      <div className="insights-hero">
        <div className="insights-title">Price Insights 📊</div>
        <div className="area-tabs">
          {["Yaba","Lekki","Ikeja"].map(a => (
            <div key={a} className={`area-tab ${area===a?"active":""}`} onClick={() => setArea(a)}>{a}</div>
          ))}
        </div>
      </div>

      <div className="savings-card">
        <div className="savings-label">💡 Potential Savings</div>
        <div className="savings-amount">{savings > 0 ? `₦${savings.toLocaleString()}` : "—"}</div>
        <div className="savings-desc">between cheapest and most expensive {activeItem} in {area}</div>
      </div>

      <div className="section-label">Price Trend by Item</div>
      <div className="cats-row" style={{marginBottom:12}}>
        {ITEMS.slice(0,4).map(i => (
          <div key={i.id} className={`cat-chip ${activeItem===i.id?"active":""}`} onClick={() => setActiveItem(i.id)}>
            <span>{i.icon}</span><p>{i.label.split(" ")[0]}</p>
          </div>
        ))}
      </div>

      {loading ? <Spinner /> : chartData.length === 0
        ? <div className="empty-state"><div className="empty-icon">📊</div><p>No data yet for {item?.label} in {area}</p></div>
        : (
          <div className="chart-card">
            <div className="chart-title">{item?.icon} {item?.label} — {area}</div>
            <div className="chart-sub">{pct > 0 ? (diff > 0 ? `↑ Up ${pct}% across reports` : `↓ Down ${pct}% across reports`) : "Stable prices"} · Latest: ₦{chartData[chartData.length-1]?.toLocaleString()}</div>
            <MiniBarChart data={chartData} color={diff > 0 ? "#FF3B3B" : "#00C48C"} />
            <div className="chart-legend">
              <div className="legend-item"><div className="legend-dot" style={{background: diff>0?"#FF3B3B":"#00C48C"}} /><span>Latest</span></div>
              <div className="legend-item"><div className="legend-dot" style={{background:"rgba(255,255,255,0.06)"}} /><span>Earlier</span></div>
            </div>
          </div>
        )
      }
    </div>
  );
}

    const ASSETS = ['/'];
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)));
      // Do NOT skipWaiting — show update toast first
    });
    self.addEventListener('activate', e => {
      e.waitUntil(
        caches.keys().then(keys =>
          Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
        ).then(() => self.clients.claim())
      );
    });
    self.addEventListener('fetch', e => {
      if (e.request.url.includes('supabase') ||
          e.request.url.includes('fonts.googleapis') ||
          e.request.url.includes('cdnjs')) return;
      e.respondWith(
        caches.match(e.request).then(cached => {
          return cached || fetch(e.request).then(res => {
            const clone = res.clone();
            caches.open(CACHE).then(c => c.put(e.request, clone));
            return res;
          }).catch(() => cached);
        })
      );
    });
    self.addEventListener('message', e => {
      if (e.data === 'SKIP_WAITING') self.skipWaiting();
    });
  `;

  const blob  = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);

  navigator.serviceWorker.register(swUrl).then(reg => {

    function showUpdateToast(worker) {
      if (document.getElementById('update-toast')) return;
      const toast = document.createElement('div');
      toast.id = 'update-toast';
      toast.innerHTML = `
        <div style="
          position:fixed;top:70px;left:50%;transform:translateX(-50%);
          width:calc(100% - 40px);max-width:390px;
          background:#161616;border:1px solid #00C48C;
          border-radius:14px;padding:12px 16px;
          display:flex;align-items:center;justify-content:space-between;
          gap:12px;z-index:9999;box-shadow:0 4px 24px rgba(0,196,140,0.25);
          font-family:'DM Sans',sans-serif;
          animation:slideDown 0.35s cubic-bezier(0.175,0.885,0.32,1.275);
        ">
          <div style="display:flex;align-items:center;gap:10px;">
            <span style="font-size:22px">🆕</span>
            <div>
              <div style="font-size:13px;font-weight:700;color:#F5F5F0;">Update Available</div>
              <div style="font-size:11px;color:#888;">Tap Update to get the latest version</div>
            </div>
          </div>
          <div style="display:flex;gap:8px;flex-shrink:0;">
            <button id="update-btn" style="
              background:#00C48C;color:#000;border:none;border-radius:8px;
              padding:8px 14px;font-size:12px;font-weight:800;cursor:pointer;
              font-family:'DM Sans',sans-serif;
            ">Update</button>
            <button id="later-btn" style="
              background:transparent;color:#888;border:1px solid #2A2A2A;
              border-radius:8px;padding:8px 10px;font-size:12px;cursor:pointer;
              font-family:'DM Sans',sans-serif;
            ">Later</button>
          </div>
        </div>
        <style>
          @keyframes slideDown {
            from{opacity:0;transform:translateX(-50%) translateY(-20px);}
            to{opacity:1;transform:translateX(-50%) translateY(0);}
          }
        </style>
      `;
      document.body.appendChild(toast);

      document.getElementById('update-btn').addEventListener('click', () => {
        worker.postMessage('SKIP_WAITING');
        navigator.serviceWorker.addEventListener('controllerchange', () => window.location.reload());
        toast.remove();
      });
      document.getElementById('later-btn').addEventListener('click', () => toast.remove());
    }

    if (reg.waiting) showUpdateToast(reg.waiting);

    reg.addEventListener('updatefound', () => {
      const nw = reg.installing;
      nw.addEventListener('statechange', () => {
        if (nw.state === 'installed' && navigator.serviceWorker.controller) {
          showUpdateToast(nw);
        }
      });
    });

  }).catch(() => {});

  // Check for updates every 60 seconds while app is open
  setInterval(() => {
    navigator.serviceWorker.getRegistration().then(reg => { if (reg) reg.update(); });
  }, 60000);
}

// ── INSTALL PROMPT — "Add to Home Screen" ────────────────────────────────────
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  setTimeout(() => {
    if (!deferredPrompt) return;
    const banner = document.createElement('div');
    banner.id = 'install-banner';
    banner.innerHTML = `
      <div style="
        position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
        width:calc(100% - 40px);max-width:390px;
        background:#161616;border:1px solid #00C48C;
        border-radius:14px;padding:12px 16px;
        display:flex;align-items:center;justify-content:space-between;
        gap:12px;z-index:999;box-shadow:0 4px 24px rgba(0,196,140,0.2);
        font-family:'DM Sans',sans-serif;animation:slideUp 0.3s ease;
      ">
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:24px">⚡</span>
          <div>
            <div style="font-size:13px;font-weight:700;color:#F5F5F0;">Add to Home Screen</div>
            <div style="font-size:11px;color:#888;">Use PricePulse like a real app</div>
          </div>
        </div>
        <div style="display:flex;gap:8px;flex-shrink:0;">
          <button id="install-btn" style="
            background:#00C48C;color:#000;border:none;border-radius:8px;
            padding:8px 14px;font-size:12px;font-weight:800;cursor:pointer;
            font-family:'DM Sans',sans-serif;
          ">Install</button>
          <button id="dismiss-btn" style="
            background:transparent;color:#888;border:1px solid #2A2A2A;
            border-radius:8px;padding:8px 10px;font-size:12px;cursor:pointer;
            font-family:'DM Sans',sans-serif;
          ">x</button>
        </div>
      </div>
      <style>
        @keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(20px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
      </style>
    `;
    document.body.appendChild(banner);
    document.getElementById('install-btn').addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      deferredPrompt = null;
      banner.remove();
    });
    document.getElementById('dismiss-btn').addEventListener('click', () => banner.remove());
  }, 30000);
});
</script>
